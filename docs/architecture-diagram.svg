  <text x="620" y="430" font-family="Arial, sans-serif" font-size="12" fill="#666">REST APIs</text>
  <text x="620" y="630" font-family="Arial, sans-serif" font-size="12" fill="#666">AI Processing</text>
  <text x="420" y="730" font-family="Arial, sans-serif" font-size="12" fill="#666">External Data</text>
  <text x="620" y="890" font-family="Arial, sans-serif" font-size="12" fill="#666">Data Storage</text>
  
  <!-- Platform Info -->
