  <!-- Backend to External APIs -->
  <line x1="400" y1="600" x2="400" y2="800" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"></line>
  <line x1="800" y1="600" x2="800" y2="800" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"></line>
  
  <!-- Backend to Database -->
  <line x1="600" y1="600" x2="600" y2="980" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"></line>
  
  <!-- Infrastructure Support Lines -->
